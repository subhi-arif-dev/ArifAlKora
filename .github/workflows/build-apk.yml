name: Build Release Android App

on:
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً بضغطة زر

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/arifalkora.jks

    - name: Build Release APK & AAB
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease bundleRelease --no-daemon

    - name: Upload Release APK (للتجربة على هاتفك)
      uses: actions/upload-artifact@v4
      with:
        name: ArifAlKora-Release-APK
        path: app/build/outputs/apk/release/app-release.apk

    - name: Upload Release AAB (للرفع على جوجل بلاي)
      uses: actions/upload-artifact@v4
      with:
        name: ArifAlKora-Release-AAB
        path: app/build/outputs/bundle/release/app-release.aab
